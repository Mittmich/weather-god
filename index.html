<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather God</title>
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <main class="app">
      <h1>Weather God</h1>
      <p class="subtitle">Detailed weather dashboard for temperature, precipitation, wind, and sun data.</p>

      <form id="weather-form" class="controls" aria-label="Weather controls">
        <label>
          Location
          <select id="location-select" name="location">
            <option value="52.52,13.405,Berlin">Berlin, Germany</option>
            <option value="47.3769,8.5417,Zurich">Zurich, Switzerland</option>
            <option value="40.7128,-74.006,New York">New York, USA</option>
            <option value="35.6762,139.6503,Tokyo">Tokyo, Japan</option>
            <option value="-33.8688,151.2093,Sydney">Sydney, Australia</option>
          </select>
        </label>

        <label>
          Or search location
          <div class="autocomplete-wrapper">
            <input id="location-query" name="location-query" type="text"
                   placeholder="Type city, region, or country" autocomplete="off" />
            <ul id="autocomplete-list" class="autocomplete-list" hidden></ul>
          </div>
        </label>

        <label>
          Model altitude (meters)
          <input id="altitude" name="altitude" type="number" min="-430" max="8849" step="1" value="0" />
        </label>

        <button type="submit">Load weather</button>
      </form>

      <div id="favourites-section" class="favourites-section" hidden>
        <p class="favourites-label">Favourites</p>
        <div id="favourites-list" class="favourites-list"></div>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <section id="results" class="results" hidden>
        <div class="result-header">
          <h2 id="result-location"></h2>
          <button type="button" id="save-favourite-btn" class="fav-btn" title="Save to favourites">☆ Save</button>
        </div>

        <div class="section-header">
          <h3>Hourly Forecast</h3>
          <div class="day-selector" id="day-selector"></div>
        </div>
        <div id="hourly-charts" class="hourly-charts"></div>

        <h3 class="section-title">7-Day Forecast</h3>
        <div id="forecast-days" class="forecast-days"></div>
      </section>
    </main>

    <script type="module" src="./app.js?v=2"></script>
  </body>
</html>
